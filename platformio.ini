; ============================================================
; PlatformIO Project Configuration
; Orion Fleet Intelligence — Heltec Wireless Tracker
; ============================================================

; Base config — dipakai oleh semua environment
[base]
platform  = espressif32
board     = heltec_wireless_tracker
framework = arduino

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, log2file
monitor_dtr     = 0
monitor_rts     = 0

upload_speed = 921600

; Partition scheme untuk OTA support (8MB flash)
board_build.partitions = default_8MB.csv

lib_deps =
    jgromes/RadioLib @ ^6.6.0
    mikalhart/TinyGPSPlus @ ^1.0.3

extra_scripts = pre:scripts/patch_radiolib.py

build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; ============================================================
; DEVELOPMENT — Serial monitor aktif, debug output ON
; Gunakan: pio run -e dev  atau  pio run (default)
; ============================================================
[env:dev]
extends      = base
build_flags  =
    ${base.build_flags}
    -D DEBUG_ENABLED=1

; ============================================================
; RELEASE — Production build, debug OFF, dipakai oleh flash_unit.py
; Gunakan: pio run -e release -t upload
; ============================================================
[env:release]
extends      = base
build_flags  =
    ${base.build_flags}
    ; DEBUG_ENABLED tidak di-set → default false di config.h
